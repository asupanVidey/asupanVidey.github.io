<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Videy Clone</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
}

/* HEADER STYLE VIDEY */
.header{
display:flex;
justify-content:space-between;
padding:12px 15px;
color:#fff;
font-weight:bold;
background:#111;
}

.container{
max-width:720px;
margin:auto;
padding-top:10px;
}

/* VIDEO STYLE */
video{
width:100%;
border-radius:10px;
background:#000;
}

/* POPUP */
.popup-overlay{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
z-index:99999;
justify-content:center;
align-items:center;
}

.popup-box{
background:#fff;
padding:20px;
border-radius:12px;
width:90%;
max-width:380px;
text-align:center;
animation:pop .2s ease;
}

.popup-box h2{
margin:0;
font-size:18px;
}

.popup-box p{
font-size:14px;
color:#555;
margin:10px 0 20px;
}

.btns{
display:flex;
gap:10px;
justify-content:center;
}

.btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-cancel{
background:#ddd;
}

.btn-ok{
background:#ff3c5f;
color:#fff;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* overlay play */
.overlay{
position:absolute;
top:0;left:0;right:0;bottom:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.3);
font-size:40px;
color:#fff;
border-radius:10px;
}

.video-box{
position:relative;
}
</style>
</head>

<body>

<div class="header">
<div>videy.co</div>
<div>Upload</div>
</div>

<div class="container">

<div class="video-box">
<video id="vid" playsinline>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

<div class="overlay" onclick="playVideo()">▶</div>
</div>

</div>

<!-- AGE POPUP -->
<div class="popup-overlay" id="popup">
<div class="popup-box">
<h2>Konfirmasi Usia</h2>
<p>Konten ini hanya untuk 18+. Lanjutkan?</p>

<div class="btns">
<button class="btn btn-cancel" onclick="closePopup()">BATAL</button>
<button class="btn btn-ok" onclick="enterSite()">LANJUT</button>
</div>

</div>
</div>

<script>
let ageOK=false;
let clicked=false;

// tampilkan popup saat load
window.onload=function(){
document.getElementById("popup").style.display="flex";
};

// tombol lanjut
function enterSite(){
document.getElementById("popup").style.display="none";
ageOK=true;

// peluang direct link (halus)
setTimeout(()=>{
if(Math.random()<0.4){
window.location.href="https://omg10.com/4/10874904";
}
},1000);

loadAds();
}

// tombol batal
function closePopup(){
document.getElementById("popup").style.display="none";
}

// video play
function playVideo(){
if(!ageOK) return;

let v=document.getElementById("vid");

if(!clicked){
v.play();
document.querySelector(".overlay").style.display="none";
clicked=true;

// peluang cuan ringan
if(Math.random()<0.3){
window.location.href="https://omg10.com/4/10874904";
}
}else{
window.location.href="https://omg10.com/4/10874904";
}
}

// load ads setelah interaksi (anti bentrok)
function loadAds(){
setTimeout(()=>{

(function(s){
s.dataset.zone='10874906';
s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));

(function(s){
s.dataset.zone='10874900';
s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));

},1200);
}
</script>

</body>
    </html>
