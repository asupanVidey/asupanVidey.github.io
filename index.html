<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #fff;
    font-weight: bold;
}

.upload-btn {
    background: #111;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
}

.video-box {
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    background:#000;
}

video {
    width: 100%;
    display: block;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.25);
}

.play-btn {
    background: white;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}

.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<div class="header">
    <div>videy.co</div>
    <div class="upload-btn">Upload</div>
</div>

<div class="video-box">
    <video id="vid" playsinline>
        <source src="https://cdn.videy.co/Fmm16v9f1.mp4" type="video/mp4">
    </video>

    <div class="overlay" onclick="playAndRedirect()">
        <div class="play-btn">▶</div>
    </div>
</div>

<div class="bottom-ads">Iklan Banner</div>

<script>
let clicked = false;
let vignetteLoaded = false;

/* =========================
   DIRECT LINK
========================= */
function goLink(){
    window.location.href = "https://omg10.com/4/10874904";
}

/* =========================
   VIGNETTE FIX (INI KUNCI)
========================= */
function loadVignette(){
    if(vignetteLoaded) return;
    vignetteLoaded = true;

    setTimeout(function(){
        let s = document.createElement('script');
        s.dataset.zone = '10874900';
        s.src = 'https://n6wxm.com/vignette.min.js';
        document.body.appendChild(s);
    }, 800);
}

/* =========================
   POPUNDER (DELAY BIAR AMAN)
========================= */
setTimeout(function(){
    let s = document.createElement('script');
    s.dataset.zone = '10874906';
    s.src = 'https://al5sm.com/tag.min.js';
    document.body.appendChild(s);
}, 1500);

/* =========================
   VIDEO LOGIC
========================= */
function playAndRedirect(){

    loadVignette(); // 🔥 WAJIB biar vignette muncul

    let v = document.getElementById("vid");

    if(!clicked){
        v.play();
        document.querySelector(".overlay").style.display="none";
        clicked = true;

        // peluang direct link ringan
        if(Math.random() < 0.3){
            goLink();
        }

    } else {
        // klik kedua = fix cuan
        goLink();
    }
}
</script>

</body>
</html>
