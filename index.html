<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body {
  margin:0;
  background:#000;
  overflow:hidden;
}

.container {
  height:100vh;
  width:100%;
  overflow-y:scroll;
  scroll-snap-type: y mandatory;
}

.video-box {
  height:100vh;
  width:100%;
  scroll-snap-align:start;
  position:relative;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="container" id="container"></div>

<script>
fetch('videos.json')
.then(res => res.json())
.then(data => {
  let html = "";
  data.forEach((vid, i) => {
    html += `
      <div class="video-box" onclick="goVideo(${i})">
        <video src="${vid.file}" autoplay muted loop playsinline></video>
      </div>
    `;
  });
  document.getElementById("container").innerHTML = html;
});

function goVideo(id){
  window.location.href = "video.html?id=" + id;
}
</script>

</body>
</html>
