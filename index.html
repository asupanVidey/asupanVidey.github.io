<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #fff;
    font-weight: bold;
}

.upload-btn {
    background: #111;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
}

/* VIDEO */
.video-box {
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}

video {
    width: 100%;
    display: block;
}

/* CLICK LAYER (tanpa tombol play) */
.tap-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
}

/* AGE GATE */
.age-gate {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.age-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    width: 80%;
    max-width: 320px;
}

.age-box h2 {
    margin: 0 0 10px;
}

.age-btn {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: black;
    color: white;
    font-weight: bold;
    width: 100%;
    cursor: pointer;
}

/* ADS */
.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<!-- AGE CONFIRM -->
<div class="age-gate" id="ageGate">
    <div class="age-box">
        <h2>Konfirmasi Usia</h2>
        <p>Konten ini hanya untuk 18+</p>
        <button class="age-btn" onclick="enterSite()">Saya Berusia 18+</button>
    </div>
</div>

<div class="header">
    <div>videy.co</div>
    <div class="upload-btn">Upload</div>
</div>

<!-- VIDEO -->
<div class="video-box">
    <video id="vid" src="https://cdn.videy.co/Fmm16v9f1.mp4"></video>

    <!-- tanpa tombol play -->
    <div class="tap-layer" onclick="handleVideoClick()"></div>
</div>

<!-- BANNER -->
<div class="bottom-ads"></div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<script>
let unlocked = false;

function enterSite(){
    document.getElementById("ageGate").style.display = "none";
    unlocked = true;
}

function handleVideoClick(){
    if(!unlocked) return;

    const v = document.getElementById("vid");

    // klik pertama = play
    if(v.paused){
        v.play();
    } else {
        // klik berikutnya = direct link (CUAN)
        window.location.href = "https://omg10.com/4/10874904";
    }
}
</script>

</body>
</html>
