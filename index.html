<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">
<title>Video Viral</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}
#agePopup{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;display:flex;justify-content:center;align-items:center;z-index:999999;}
.box{background:#fff;padding:20px;border-radius:10px;text-align:center;}
.video-box{margin:15px;border-radius:15px;overflow:hidden;position:relative;}
video{width:100%;}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:center;background:#0003;}
</style>
</head>

<body>

<div id="agePopup">
<div class="box">
<h3>18+ Only</h3>
<button onclick="enterSite()">Enter</button>
</div>
</div>

<div class="video-box">
<video id="vid" src="https://cdn.videy.co/Fmm16v9f1.mp4"></video>
<div class="overlay" onclick="playAndRedirect()">▶</div>
</div>

<script>
let clickCount=0, ageConfirmed=false;

// rotator link
let links=[
"https://omg10.com/4/10874904",
"https://omg10.com/4/10874904"
];
function goLink(){window.location.href=links[Math.floor(Math.random()*links.length)];}

// age
function enterSite(){
document.getElementById("agePopup").style.display="none";
ageConfirmed=true;

setTimeout(()=>{if(Math.random()<0.5) goLink();},1000);
loadAds();
}

// iklan delay
function loadAds(){
setTimeout(()=>{
(function(s){s.dataset.zone='10874906';s.src='https://al5sm.com/tag.min.js';})(document.body.appendChild(document.createElement('script')));
(function(s){s.dataset.zone='10874900';s.src='https://n6wxm.com/vignette.min.js';})(document.body.appendChild(document.createElement('script')));
},1500);
}

// video
function playAndRedirect(){
if(!ageConfirmed)return;
let v=document.getElementById("vid");
clickCount++;

if(clickCount==1){
v.play();
document.querySelector(".overlay").style.display="none";
if(Math.random()<0.4) goLink();
}
else if(clickCount==2){
goLink();
}
}

// auto next
document.getElementById("vid").addEventListener("ended",()=>{
window.location.href="page2.html";
});
</script>

</body>
</html>
