<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- META MONETAG (SUDAH TERPASANG) -->
<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #fff;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.upload-btn {
    background: #111;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
}

.video-box {
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}

.video-box img {
    width: 100%;
}

.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}

.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    padding: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="header">
    <div>videy.co</div>
    <div class="upload-btn">Upload</div>
</div>

<!-- VIDEO -->
<div class="video-box" onclick="redirectAd()">
    <img src="https://via.placeholder.com/500x700">
    <div class="play-btn">▶</div>
</div>

<!-- BANNER -->
<div class="bottom-ads">
    PASANG SCRIPT BANNER SINI
</div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='ISI_ZONE_POPUNDER';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='ISI_ZONE_VIGNETTE';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- DIRECT LINK -->
<script>
function redirectAd(){
    window.location.href = "ISI_DIRECT_LINK_KAMU";
}
</script>

</body>
</html>
