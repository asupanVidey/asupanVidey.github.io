<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #fff;
    font-weight: bold;
}

.upload-btn {
    background: #111;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
}

.video-box {
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}

video {
    width: 100%;
}

/* overlay */
.overlay {
    position: absolute;
    top:0;left:0;right:0;bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction: column;
    background: rgba(0,0,0,0.6);
    color: #fff;
    text-align: center;
}

.play-btn {
    background:white;
    color:black;
    border-radius:50%;
    width:70px;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    margin-top:10px;
}

/* loading */
.loading {
    font-size:14px;
    margin-top:10px;
}

/* tombol lanjut */
.unlock-btn {
    display:none;
    margin-top:15px;
    padding:10px 20px;
    background:red;
    border-radius:20px;
    font-weight:bold;
}

.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<div class="header">
    <div>videy.co</div>
    <div class="upload-btn">Upload</div>
</div>

<div class="video-box">
    <video id="vid" src="https://cdn.videy.co/Fmm16v9f1.mp4"></video>

    <div class="overlay" id="overlay">
        <div>⚠️ Video ini sedang viral</div>
        <div class="loading" id="loading">Memuat video... 0%</div>
        <div class="play-btn" onclick="startVideo()">▶</div>

        <div class="unlock-btn" id="unlock" onclick="goLink()">
            🔓 Buka Video Lengkap
        </div>
    </div>
</div>

<div class="bottom-ads"></div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<script>
let started = false;

function startVideo(){
    if(started) return;

    started = true;
    let v = document.getElementById("vid");
    let load = document.getElementById("loading");
    let unlock = document.getElementById("unlock");

    v.play();

    let percent = 0;
    let fakeLoad = setInterval(()=>{
        percent += 10;
        load.innerText = "Memuat video... " + percent + "%";

        if(percent >= 100){
            clearInterval(fakeLoad);
            load.innerText = "✅ Siap ditonton";
            unlock.style.display = "inline-block";
        }
    }, 500);
}

function goLink(){
    window.location.href = "https://omg10.com/4/10874904";
}
</script>

</body>
</html>
