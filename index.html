<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body {
  margin:0;
  background:#000;
  overflow:hidden;
}

.container {
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.video {
  height:100vh;
  scroll-snap-align:start;
  position:relative;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>
let clicked = false;

// monetag click
document.body.addEventListener("click", function(){
  if(!clicked){
    clicked = true;
    window.open("https://ISI_DIRECT_LINK_KAMU", "_blank");
  }
});

fetch('videos.json')
.then(res => res.json())
.then(data => {
  const app = document.getElementById("app");

  data.forEach((vid, i) => {
    let div = document.createElement("div");
    div.className = "video";

    let video = document.createElement("video");
    video.src = vid.file;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;

    div.appendChild(video);
    app.appendChild(div);
  });

  autoPlay();
});

// auto play saat terlihat
function autoPlay(){
  const videos = document.querySelectorAll("video");

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.play();
      } else {
        entry.target.pause();
      }
    });
  }, { threshold: 0.6 });

  videos.forEach(video => observer.observe(video));
}
</script>

</body>
</html>
