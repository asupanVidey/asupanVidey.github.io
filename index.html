<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Viral</title>

<meta name="monetag" content="ISI_META_KAMU">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #fff;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.upload-btn {
    background: #111;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
}

/* VIDEO */
.video-box {
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}

.video-box img {
    width: 100%;
    display: block;
}

/* PLAY BUTTON */
.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}

/* BOTTOM ADS */
.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    padding: 10px;
    text-align: center;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
}

/* AGE GATE */
#ageGate {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

#ageGate .box {
    background: #fff;
    color: #000;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    width: 80%;
    max-width: 300px;
}

#ageGate button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
}

.btn-yes {
    background: #ff2d55;
    color: #fff;
    font-weight: bold;
}

.btn-no {
    background: #ddd;
    color: #000;
}
</style>
</head>

<body>

<!-- AGE GATE -->
<div id="ageGate">
    <div class="box">
        <h3>Konfirmasi Usia</h3>
        <p>Konten ini hanya untuk 18+</p>

        <button class="btn-yes" onclick="enterSite()">Saya 18+</button>
        <button class="btn-no" onclick="enterSite()">Keluar</button>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <div>vldey.co</div>
    <div class="upload-btn">Upload</div>
</div>

<!-- VIDEO -->
<div class="video-box" onclick="redirectAd()">
    <img src="https://via.placeholder.com/500x700" alt="video">
    <div class="play-btn">▶</div>
</div>

<!-- IKLAN BANNER -->
<div class="bottom-ads">
    PASANG SCRIPT BANNER DI SINI
</div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='ISI_ZONE_POPUNDER';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='ISI_ZONE_VIGNETTE';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- AGE GATE TIMER 5 DETIK -->
<script>
setTimeout(function(){
    document.getElementById("ageGate").style.display = "flex";
}, 5000);

function enterSite(){
    document.getElementById("ageGate").style.display = "none";
}
</script>

<!-- DIRECT LINK -->
<script>
function redirectAd(){
    window.location.href = "ISI_DIRECT_LINK_KAMU";
}
</script>

</body>
</html>
