<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* 🔥 POPUP TANPA BLUR */
#agePopup {
    display:flex;
    position: fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7); /* tanpa blur */
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.age-box {
    background:#fff;
    padding:24px;
    border-radius:12px;
    width:90%;
    max-width:400px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    animation:fadeIn 0.3s ease;
}

.age-box h3 {
    margin-top:0;
}

.buttons {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:15px;
}

.buttons button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.btn-no {
    background:#e0e0e0;
}

.btn-yes {
    background:#ff3c5f;
    color:#fff;
}

.buttons button:hover {
    transform:scale(1.05);
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

/* VIDEO */
.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#fff;
    font-weight:bold;
}

.video-box {
    margin:15px;
    border-radius:15px;
    overflow:hidden;
    position:relative;
}

video {width:100%;}

.overlay {
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.3);
}

.play-btn {
    background:#fff;
    width:70px;height:70px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
}
</style>
</head>

<body>

<!-- 🔥 AGE POPUP -->
<div id="agePopup">
    <div class="age-box">
        <h3>Konfirmasi Usia</h3>
        <p>Video ini mengandung konten dewasa. Apakah Anda berusia 18+?</p>

        <div class="buttons">
            <button class="btn-no" onclick="goLink()">BATAL</button>
            <button class="btn-yes" onclick="enterSite()">LANJUT</button>
        </div>
    </div>
</div>

<div class="header">
    <div>videy.co</div>
</div>

<div class="video-box">
    <video id="vid" src="https://cdn.videy.co/Fmm16v9f1.mp4"></video>

    <div class="overlay" onclick="playAndRedirect()">
        <div class="play-btn">▶</div>
    </div>
</div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<script>
// 🔥 MULTI LINK
let links = [
 "https://omg10.com/4/10874904",
 "https://omg10.com/4/10874905",
 "https://omg10.com/4/10874906"
];

function goLink(){
    let rand = links[Math.floor(Math.random()*links.length)];
    window.location.href = rand;
}

let clicked = false;
let ageConfirmed = false;

// 🔥 AGE LOGIC
function enterSite(){
    document.querySelector(".age-box").innerHTML = "<h3>Loading video...</h3>";

    setTimeout(() => {
        document.getElementById("agePopup").style.display = "none";
        ageConfirmed = true;
    }, 1200);

    setTimeout(() => {
        goLink();
    }, 2200);
}

// 🔥 VIDEO
function playAndRedirect(){
    if(!ageConfirmed) return;

    let v = document.getElementById("vid");

    if(!clicked){
        v.play();
        document.querySelector(".overlay").style.display="none";
        clicked = true;

        setTimeout(() => {
            goLink();
        }, 4000);

    } else {
        goLink();
    }
}

// 🔥 BACK BUTTON
history.pushState(null, null, location.href);
window.onpopstate = function(){
    goLink();
};
</script>

</body>
</html>
