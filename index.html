<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
body{margin:0;background:#000;font-family:Arial}
.container{max-width:720px;margin:auto;padding:15px}
video{width:100%;border-radius:10px}

.overlay{
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:9999;
}

.box{
background:#fff;
padding:20px;
border-radius:12px;
text-align:center;
width:90%;
max-width:320px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.ok{background:#ff3c5f;color:#fff}
.no{background:#ccc}
</style>

</head>

<body>

<div class="container">
<div style="position:relative">

<video preload="metadata">
<source src="https://cdn.videy.co/kA7kmjzY1.mp4" type="video/mp4">
</video>

<div class="overlay" id="overlay">▶ Klik untuk membuka video</div>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="box">
<h3>Konfirmasi</h3>
<p>Klik lanjut untuk menonton</p>
<button class="no" onclick="tutup()">Batal</button>
<button class="ok" onclick="lanjut()">Lanjut</button>
</div>
</div>

<!-- POPUNDER -->
<script>
(function(){
var s=document.createElement('script');
s.src='https://al5sm.com/tag.min.js';
s.dataset.zone='10829867';
document.body.appendChild(s);
})();
</script>

<!-- VIGNETTE -->
<script>
(function(){
var s=document.createElement('script');
s.src='https://n6wxm.com/vignette.min.js';
s.dataset.zone='10829884';
document.body.appendChild(s);
})();
</script>

<script>
let clicked = false;

// 🔥 DIRECT LINK (UTAMA)
const direct = "https://omg10.com/4/10829870";

const overlay = document.getElementById("overlay");
const popup = document.getElementById("popup");

// klik video → popup
overlay.onclick = function(){
popup.style.display="flex";
};

// lanjut → buka direct link
function lanjut(){
window.open(direct,'_blank');

setTimeout(()=>{
window.open(direct,'_blank');
},1200);

popup.style.display="none";
}

// batal → tetap dipancing lagi
function tutup(){
popup.style.display="none";
setTimeout(()=>{
popup.style.display="flex";
},2000);
}

// klik pertama → trigger direct link
document.body.addEventListener("click", function(){
if(!clicked){
clicked = true;
window.open(direct,'_blank');
}
});

// auto popup biar impresi naik
setTimeout(()=>{
popup.style.display="flex";
},3000);

</script>

</body>
  </html>
