<script>
let videos = [];

// fungsi acak array
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

fetch('videos.json')
.then(res => res.json())
.then(data => {

  // 🔥 ACAK VIDEO
  videos = shuffle(data);

  // tampilkan video pertama
  document.getElementById("mainPlayer").src = videos[0].file;
  document.getElementById("mainTitle").innerText = videos[0].title;

  let html = "";
  videos.forEach((vid, i) => {
    if(i !== 0){
      html += `
        <div class="item" onclick="gantiVideo(${i})">
          <video src="${vid.file}"></video>
          <div class="item-title">${vid.title}</div>
        </div>
      `;
    }
  });

  document.getElementById("videoList").innerHTML = html;
});

// ganti video
function gantiVideo(i){
  document.getElementById("mainPlayer").src = videos[i].file;
  document.getElementById("mainTitle").innerText = videos[i].title;
}
</script>
