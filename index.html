<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<style>
body{
    margin:0;
    background:black;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

/* HALAMAN AWAL (CLICK GATE) */
#gate{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

#btn{
    padding:14px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#1db954;
    color:white;
    cursor:pointer;
}

/* VIDEO PAGE */
#videoPage{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

video{
    width:100%;
    max-width:520px;
    border-radius:10px;
    background:#111;
}
</style>
</head>

<body>

<!-- ================= GATE ================= -->
<div id="gate">
    <h2>Click to Continue</h2>
    <button id="btn">Watch Video</button>
</div>

<!-- ================= VIDEO PAGE ================= -->
<div id="videoPage">
    <video id="video" controls playsinline>
        <source src="VIDEO_URL" type="video/mp4">
    </video>
</div>

<!-- ================= MONETAG ================= -->

<!-- Popunder -->
<script>
(function(s){
    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- Vignette -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- ================= LOGIC ================= -->
<script>
const gate = document.getElementById("gate");
const btn = document.getElementById("btn");
const videoPage = document.getElementById("videoPage");
const video = document.getElementById("video");

/* klik pertama = trigger funnel */
btn.onclick = function(){

    // tampilkan video page
    gate.style.display = "none";
    videoPage.style.display = "flex";

    // autoplay video
    setTimeout(()=>{
        video.play().catch(()=>{});
    },300);
};
</script>

</body>
</html>
