<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viideyhub</title>

<style>
body {
  margin:0;
  background:#fff;
  color:#000;
  font-family:Arial;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

.upload {
  background:#0d1b2a;
  color:#fff;
  padding:8px 16px;
  border-radius:25px;
  font-size:14px;
}

.container {
  padding:10px;
}

/* VIDEO UTAMA */
.main-video video {
  width:100%;
  border-radius:15px;
}

.main-title {
  font-size:18px;
  font-weight:bold;
  margin:10px 0;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item {
  cursor:pointer;
}

.item video {
  width:100%;
  border-radius:10px;
}

.item-title {
  font-size:13px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">viideyhub</div>
  <div class="upload">Upload</div>
</div>

<div class="container">

  <!-- VIDEO UTAMA -->
  <div class="main-video">
    <video id="mainPlayer" autoplay muted controls></video>
  </div>

  <!-- JUDUL UTAMA -->
  <div class="main-title" id="mainTitle"></div>

  <!-- VIDEO LAIN -->
  <div class="grid" id="videoList"></div>

</div>

<script>
let videos = [];

// load video
fetch('videos.json')
.then(res => res.json())
.then(data => {

  videos = data;

  // video pertama
  document.getElementById("mainPlayer").src = data[0].file;
  document.getElementById("mainTitle").innerText = data[0].title;

  let html = "";
  data.forEach((vid, i) => {
    if(i !== 0){
      html += `
        <div class="item" onclick="gantiVideo(${i})">
          <video src="${vid.file}"></video>
          <div class="item-title">${vid.title}</div>
        </div>
      `;
    }
  });

  document.getElementById("videoList").innerHTML = html;
});

// ganti video
function gantiVideo(i){
  document.getElementById("mainPlayer").src = videos[i].file;
  document.getElementById("mainTitle").innerText = videos[i].title;
}
</script>

</body>
</html>
