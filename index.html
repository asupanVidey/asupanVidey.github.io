<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    overflow: hidden;
}

/* HEADER MINIMAL */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 12px 15px;
    color: white;
    font-weight: bold;
    z-index: 10;
}

/* VIDEO FULL SCREEN STYLE */
.video-box {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

/* TAP LAYER (biar semua klik jadi monetisasi) */
.tap-layer {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 5;
}

/* ADS BOTTOM */
.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    background: rgba(255,255,255,0.9);
    padding: 8px;
    z-index: 20;
}
</style>
</head>

<body>

<div class="header">
    <div>videy.co</div>
    <div>Upload</div>
</div>

<div class="video-box">
    
    <video id="vid"
        src="https://cdn.videy.co/Fmm16v9f1.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto">
    </video>

    <!-- layer klik full screen -->
    <div class="tap-layer" onclick="goRedirect()"></div>

</div>

<div class="bottom-ads">
    <!-- banner ads -->
</div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<script>
let firstClick = false;

function goRedirect(){
    const v = document.getElementById("vid");

    if(!firstClick){
        // klik pertama: unmute + play beneran
        v.muted = false;
        v.play();
        firstClick = true;
    } else {
        // klik kedua: monetisasi direct link
        window.location.href = "https://omg10.com/4/10874904";
    }
}
</script>

</body>
</html>
