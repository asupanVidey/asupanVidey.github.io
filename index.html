<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 12px 15px;
    color: white;
    font-weight: bold;
    z-index: 10;
}

/* VIDEO FULL */
.video-box {
    width: 100%;
    height: 100vh;
    position: relative;
}

video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

/* AGE POPUP (tidak menutup full video) */
.age-popup {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    padding: 15px;
    border-radius: 12px;
    width: 85%;
    max-width: 320px;
    text-align: center;
    display: none;
    z-index: 99;
}

.age-popup h3 {
    margin: 0 0 8px;
    font-size: 16px;
}

.age-btn {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: black;
    color: white;
    font-weight: bold;
}

/* ADS */
.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    background: rgba(255,255,255,0.9);
    padding: 8px;
    z-index: 20;
}
</style>
</head>

<body>

<div class="header">
    <div>videy.co</div>
    <div>Upload</div>
</div>

<!-- VIDEO (NO AUTOPLAY) -->
<div class="video-box">
    <video id="vid"
        src="https://cdn.videy.co/Fmm16v9f1.mp4"
        playsinline
        preload="auto">
    </video>
</div>

<!-- AGE POPUP -->
<div class="age-popup" id="agePopup">
    <h3>Konfirmasi Usia</h3>
    <p>Konten ini hanya untuk 18+</p>
    <button class="age-btn" onclick="enterSite()">Saya Berusia 18+</button>
</div>

<!-- BOTTOM ADS -->
<div class="bottom-ads"></div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<script>
let ageAccepted = false;
let video = document.getElementById("vid");

// video mulai otomatis diam (tidak autoplay)
video.pause();

// tampilkan age gate setelah 5 detik
setTimeout(() => {
    document.getElementById("agePopup").style.display = "block";
}, 5000);

function enterSite(){
    ageAccepted = true;
    document.getElementById("agePopup").style.display = "none";
}

// klik video = play (tanpa tombol play)
video.addEventListener("click", function(){
    if(!ageAccepted) return;

    if(video.paused){
        video.play();
    } else {
        window.location.href = "https://omg10.com/4/10874904";
    }
});
</script>

</body>
    </html>
