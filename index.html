<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Viral</title>

<meta name="monetag" content="ISI_META_KAMU">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
    background: #111;
    font-weight: bold;
}

.upload-btn {
    background: #ff2d55;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
}

.video-box {
    margin: 12px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.video-box img {
    width: 100%;
    display: block;
    filter: brightness(0.85);
}

.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9);
    color: black;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
}

.caption {
    margin: 10px 15px;
    font-size: 14px;
    opacity: 0.8;
}

.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    color: black;
    padding: 10px;
    text-align: center;
}
</style>
</head>

<body>

<!-- AGE GATE -->
<div id="ageGate" style="
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
">

<div style="
background:#fff;
color:#000;
padding:20px;
border-radius:12px;
text-align:center;
width:80%;
max-width:300px;
">

<h3>Konfirmasi Usia</h3>
<p>Konten ini hanya untuk 18+</p>

<button onclick="enterSite()" style="
background:#ff2d55;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
margin-top:10px;
width:100%;
font-weight:bold;
">
Saya 18+
</button>

<button onclick="enterSite()" style="
background:#ddd;
color:#000;
border:none;
padding:10px;
border-radius:8px;
margin-top:10px;
width:100%;
">
Keluar
</button>

</div>
</div>

<!-- HEADER -->
<div class="header">
    <div>vldey.co</div>
    <div class="upload-btn">Upload</div>
</div>

<!-- VIDEO -->
<div class="video-box" onclick="handleClick()">
    <img src="https://via.placeholder.com/500x700" alt="video">
    <div class="play-btn">▶</div>
</div>

<div class="caption">
🔥 Video viral terbaru hari ini - klik untuk lanjut menonton
</div>

<!-- BOTTOM ADS -->
<div class="bottom-ads">
    PASANG BANNER IKLAN DI SINI
</div>

<!-- POPUNDER -->
<script>
(function(){
    let s = document.createElement('script');
    s.dataset.zone = 'ISI_ZONE_POPUNDER';
    s.src = 'https://al5sm.com/tag.min.js';
    document.body.appendChild(s);
})();
</script>

<!-- VIGNETTE -->
<script>
(function(){
    let s = document.createElement('script');
    s.dataset.zone = 'ISI_ZONE_VIGNETTE';
    s.src = 'https://n6wxm.com/vignette.min.js';
    document.body.appendChild(s);
})();
</script>

<!-- AGE GATE -->
<script>
function enterSite(){
    document.getElementById("ageGate").style.display = "none";
}
</script>

<!-- VIDEO LINK SUDAH DIPASANG -->
<script>
function handleClick(){
    setTimeout(function(){
        window.location.href = "https://cdn.videy.co/Fmm16v9f1.mp4";
    }, 1200);
}
</script>

</body>
</html>
