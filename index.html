<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* AGE POPUP */
#agePopup {
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.age-box {
    background:#fff;
    padding:20px;
    border-radius:12px;
    text-align:center;
    width:85%;
    max-width:320px;
}

.age-box button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
    width:100%;
    font-weight:bold;
}

.btn-yes {background:#000;color:#fff;}
.btn-no {background:#ccc;}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #fff;
    font-weight: bold;
}

.upload-btn {
    background: #111;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
}

.video-box {
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}

video {
    width: 100%;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.2);
}

.play-btn {
    background: white;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}

.bottom-ads {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<!-- 🔥 AGE CONFIRMATION -->
<div id="agePopup">
    <div class="age-box">
        <h3>Konfirmasi Usia</h3>
        <p>Konten ini hanya untuk 18+</p>

        <button class="btn-yes" onclick="enterSite()">Saya 18+</button>
        <button class="btn-no" onclick="enterSite()">Keluar</button>
    </div>
</div>

<div class="header">
    <div>videy.co</div>
    <div class="upload-btn">Upload</div>
</div>

<div class="video-box">
    <video id="vid" src="https://cdn.videy.co/Fmm16v9f1.mp4"></video>

    <div class="overlay" onclick="playAndRedirect()">
        <div class="play-btn">▶</div>
    </div>
</div>

<div class="bottom-ads"></div>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<script>
let clicked = false;
let ageConfirmed = false;

// 🔥 AGE LOGIC (ANTI BENTROK IKLAN)
function enterSite(){
    document.getElementById("agePopup").style.display = "none";
    ageConfirmed = true;

    // kasih delay biar ga tabrakan sama popunder
    setTimeout(() => {
        if(Math.random() < 0.4){
            window.location.href = "https://omg10.com/4/10874904";
        }
    }, 800);
}

function playAndRedirect(){
    if(!ageConfirmed) return; // blok kalau belum konfirmasi

    let v = document.getElementById("vid");

    if(!clicked){
        v.play();
        document.querySelector(".overlay").style.display="none";
        clicked = true;
    } else {
        window.location.href = "https://omg10.com/4/10874904";
    }
}
</script>

</body>
</html>
