<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viideyhub</title>

<style>
body {
  margin:0;
  background:#fff;
  color:#000;
  font-family:Arial;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

.upload {
  background:#0d1b2a;
  color:#fff;
  padding:8px 16px;
  border-radius:25px;
  font-size:14px;
}

/* CONTENT */
.container {
  padding:10px;
}

/* VIDEO UTAMA */
.main-video video {
  width:100%;
  border-radius:15px;
}

/* TEXT */
.text {
  font-size:18px;
  margin:10px 0;
}

/* BUTTON */
.btn {
  background:#ffcc00;
  color:#000;
  padding:15px;
  text-align:center;
  border-radius:30px;
  font-weight:bold;
  margin:15px 0;
}

/* GRID VIDEO */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.grid video {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">viideyhub</div>
  <div class="upload">Upload</div>
</div>

<div class="container">

  <!-- VIDEO UTAMA -->
  <div class="main-video">
    <video id="mainPlayer" autoplay muted controls></video>
  </div>

  <!-- TEXT -->
  <div class="text">
    jangan lupa follow bub ❤️
  </div>

  <!-- BUTTON -->
  <div class="btn" onclick="redirectAd()">
    GABUNG SEKARANG
  </div>

  <!-- VIDEO LAIN -->
  <div class="grid" id="videoList"></div>

</div>

<script>
let clicked = false;

function redirectAd(){
  if(!clicked){
    clicked = true;
    window.open("https://ISI_DIRECT_LINK_KAMU", "_blank");
  }
}

// load video dari JSON
fetch('videos.json')
.then(res => res.json())
.then(data => {

  document.getElementById("mainPlayer").src = data[0].file;

  let html = "";
  data.forEach((vid, i) => {
    if(i !== 0){
      html += `
        <video src="${vid.file}" onclick="gantiVideo('${vid.file}')"></video>
      `;
    }
  });

  document.getElementById("videoList").innerHTML = html;
});

// ganti video utama
function gantiVideo(src){
  document.getElementById("mainPlayer").src = src;
}
</script>

</body>
</html>
