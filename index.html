<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Viral</title>

<!-- MONETAG META -->
<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial,sans-serif;
    color:#fff;
    text-align:center;
}

/* container */
.wrapper{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* video style */
video{
    width:100%;
    max-width:500px;
    border-radius:12px;
    background:#111;
}

/* overlay age gate */
#ageGate{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

button{
    padding:12px 20px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

#enter{
    background:#1db954;
    color:#fff;
}
</style>
</head>

<body>

<!-- AGE CONFIRM -->
<div id="ageGate">
    <h2>Konfirmasi Usia</h2>
    <p>Kamu harus berusia 18+ untuk melanjutkan</p>
    <button id="enter">Saya 18+ Masuk</button>
</div>

<div class="wrapper">
    <h3>Video Viral 🔥</h3>

    <video id="video" controls playsinline>
        <source src="VIDEO_URL" type="video/mp4">
    </video>
</div>

<!-- ================= MONETAG SCRIPT ================= -->

<!-- Popunder -->
<script>
(function(s){
    s.dataset.zone='10874906'; 
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- Vignette -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- ================= LOGIC ================= -->
<script>
const gate = document.getElementById("ageGate");
const btn = document.getElementById("enter");
const video = document.getElementById("video");

/* enter site */
btn.onclick = function(){

    gate.style.display = "none";

    // delay kecil biar aman UX + trigger ads
    setTimeout(() => {
        video.play().catch(()=>{});
    }, 500);
};

/* trigger tambahan popunder saat user interaksi video */
video.addEventListener("play", function(){
    console.log("video started");
});
</script>

</body>
</html>
