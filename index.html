<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">

<title>Video Viral</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:12px 15px;
    background:#111;
    font-weight:bold;
}

.upload-btn{
    background:#fff;
    color:#000;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

.video-box{
    position:relative;
    width:100%;
    background:#000;
}

video{
    width:100%;
    height:auto;
    background:#000;
}

/* OVERLAY START */
.overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.25);
}

.play-btn{
    width:75px;
    height:75px;
    border-radius:50%;
    background:#fff;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
}

/* CTA NEXT STEP */
.cta{
    position:fixed;
    bottom:60px;
    width:100%;
    text-align:center;
    display:none;
}

.cta button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    font-weight:bold;
}

/* ADS SPACE */
.bottom-ads{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">
    <div>videy.co</div>
    <div class="upload-btn">Upload</div>
</div>

<div class="video-box" id="box">
    <video id="vid"
           src="https://cdn.videy.co/Fmm16v9f1.mp4"
           playsinline
           muted
           preload="auto"></video>

    <div class="overlay" id="overlay">
        <div class="play-btn">▶</div>
    </div>
</div>

<!-- CTA NEXT STEP (ENGAGEMENT BOOST) -->
<div class="cta" id="cta">
    <button onclick="nextStep()">Lanjut Video 🔥</button>
</div>

<div class="bottom-ads">Iklan Area</div>

<script>
let step = 0;
const vid = document.getElementById("vid");
const overlay = document.getElementById("overlay");
const cta = document.getElementById("cta");

// engagement tracker
let engaged = false;

// STEP 1: play video
overlay.addEventListener("click", () => {
    vid.muted = true;
    vid.play().catch(()=>{});
    overlay.style.display = "none";
    engaged = true;

    // trigger CTA setelah 8 detik
    setTimeout(() => {
        cta.style.display = "block";
    }, 8000);
});

// STEP 2: CTA click
function nextStep(){
    step++;

    if(step === 1){
        // simulate next content (boost retention)
        vid.src = "https://cdn.videy.co/Fmm16v9f1.mp4";
        vid.play().catch(()=>{});

        cta.style.display = "none";

        // trigger possible vignette window
        triggerAdsBoost();
    } else {
        // STEP 3: direct link (monetized exit)
        window.location.href = "https://omg10.com/4/10874904";
    }
}

// ADS BOOST SIGNAL
function triggerAdsBoost(){
    console.log("ads signal boost");
}

// extra engagement tracking
document.addEventListener("click", () => {
    engaged = true;
});
</script>

<!-- POPUNDER (STABIL) -->
<script>
window.addEventListener("load", function(){
    let s=document.createElement("script");
    s.dataset.zone="10874906";
    s.src="https://al5sm.com/tag.min.js";
    s.async=true;
    document.body.appendChild(s);
});
</script>

<!-- VIGNETTE (FIXED + STABLE LOAD) -->
<script>
window.addEventListener("load", function(){
    setTimeout(() => {
        let s=document.createElement("script");
        s.dataset.zone="10874900";
        s.src="https://n6wxm.com/vignette.min.js";
        s.async=true;
        document.body.appendChild(s);
    }, 3000); // delay penting biar monetag detect session
});
</script>

</body>
</html>
