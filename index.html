<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">
<title>Video Feed Viral</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;}
.header{padding:12px;background:#111;font-weight:bold;}
.video-box{position:relative;}
video{width:100%;}
.overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.4);
}
.btn{
  background:#fff;color:#000;
  padding:12px 18px;border-radius:30px;
  font-weight:bold;
}
.cta{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  background:red;
  padding:12px 20px;
  border-radius:25px;
}
.bottom{
  position:fixed;bottom:0;width:100%;
  background:#111;text-align:center;padding:10px;
}
</style>
</head>

<body>

<div class="header">🔥 Viral Feed</div>

<div class="video-box">
    <video id="v" src="https://cdn.videy.co/Fmm16v9f1.mp4" playsinline></video>

    <div class="overlay" id="ov" onclick="play()">
        <div class="btn">▶ Play</div>
    </div>
</div>

<div class="cta" id="cta" onclick="nextVideo()">
    ▶ Video Berikutnya
</div>

<div class="bottom">Trending video • swipe untuk lanjut</div>

<script>
let step = 0;
let impression = 0;

/* ROTASI LINK ringan (bukan redirect keras) */
const videos = [
  "https://cdn.videy.co/Fmm16v9f1.mp4",
  "https://cdn.videy.co/Fmm16v9f1.mp4"
];

function logImpression(){
    impression++;
    console.log("IMP:", impression);
}

function play(){
    document.getElementById("v").play();
    document.getElementById("ov").style.display="none";

    logImpression(); // IMP 1

    setTimeout(()=>{
        document.getElementById("cta").style.display="block";
        logImpression(); // IMP 2 (engagement milestone)
    },3000);
}

function nextVideo(){
    logImpression(); // IMP 3

    let v = document.getElementById("v");

    v.src = videos[Math.floor(Math.random()*videos.length)];
    v.play();

    document.getElementById("cta").style.display="none";

    setTimeout(()=>{
        document.getElementById("cta").style.display="block";
        logImpression(); // IMP 4
    },4000);
}
</script>

</body>
</html>
