<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="monetag" content="1f1a0960de0181ffac6d2eace1727f3f">
<title>Video Viral</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
#agePopup{
display:flex;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:9999;
}
.age-box{background:#fff;padding:20px;border-radius:10px;text-align:center;}
.buttons{margin-top:10px}
button{padding:10px;margin:5px;border:none;border-radius:6px}
.btn-yes{background:#ff3c5f;color:#fff}
.btn-no{background:#ccc}
.video-box{margin:15px;border-radius:12px;overflow:hidden;position:relative;}
video{width:100%}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;
display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,0.3)}
.play-btn{background:#fff;width:60px;height:60px;border-radius:50%;
display:flex;align-items:center;justify-content:center;font-size:25px}
</style>
</head>

<body>

<div id="agePopup">
<div class="age-box">
<h3>Konfirmasi Usia</h3>
<p>Konten ini hanya untuk 18+</p>
<div class="buttons">
<button class="btn-no" onclick="closePopup()">BATAL</button>
<button class="btn-yes" onclick="enterSite()">LANJUT</button>
</div>
</div>
</div>

<div class="video-box">
<video id="vid" src="https://cdn.videy.co/tWaLSxuZ1.mp4"></video>
<div class="overlay" onclick="playVideo()">
<div class="play-btn">▶</div>
</div>
</div>

<!-- POPUNDER -->
<script>
(function(s){
s.dataset.zone='10874906';
s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<!-- VIGNETTE -->
<script>
(function(s){
s.dataset.zone='10874900';
s.src='https://n6wxm.com/vignette.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

<script>
var pages = [
"page1.html","page2.html","page3.html","page4.html","page5.html",
"page6.html","page7.html","page8.html","page9.html","page10.html",
"page11.html","page12.html","page13.html","page14.html","page15.html",
"page16.html","page17.html","page18.html","page19.html","page20.html"
];

var ads = [
"https://omg10.com/4/10874904",
"https://omg10.com/4/10874905",
"https://omg10.com/4/10874906"
];

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

var clicked=false, ageConfirmed=false;

function enterSite(){
document.getElementById("agePopup").style.display="none";
ageConfirmed=true;
}

function closePopup(){
document.getElementById("agePopup").style.display="none";
}

function playVideo(){
if(!ageConfirmed) return;

var v=document.getElementById("vid");
var o=document.querySelector(".overlay");

if(!clicked){
v.play(); o.style.display="none";
clicked=true;

setTimeout(function(){
if(Math.random()<0.6){
window.location.href = rand(pages);
}else{
window.location.href = rand(ads);
}
},5000);

}else{
window.location.href = rand(ads);
}
}

// back button
history.pushState(null,null,location.href);
window.onpopstate=function(){
window.location.href = rand(ads);
};
</script>

</body>
                               </html>
